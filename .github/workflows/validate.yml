name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
      - run: npm ci
      - name: Generate TypeScript bindings
        run: npm run gen:types
      - name: Run conformance + regression suite
        run: npm test
