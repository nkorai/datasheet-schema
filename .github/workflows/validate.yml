name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Generate TypeScript bindings
        run: npm run gen:types
      - name: Run conformance suite (examples + positive/negative fixtures)
        run: npm run validate
