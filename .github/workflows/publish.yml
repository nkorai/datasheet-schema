name: publish

# npm publishing is manual and deliberate (workflow_dispatch only): it never
# runs on push. The GitHub Pages deploy, which serves the landing site and the
# versioned schema URLs so $id references resolve, also runs on push to main so
# the documentation stays current between releases.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

# One in-flight Pages deploy at a time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  npm:
    # Only a deliberate dispatch publishes to npm, never a push.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      # Authenticates via npm trusted publishing (OIDC). Requires a trusted
      # publisher configured on npmjs.com for this repo and workflow. No token.
      - run: npx npm@11 publish --access public --provenance

  pages:
    # Deploys on push only. A release is always "push the commit, then dispatch
    # publish"; the push already redeploys the site, so gating this to push
    # avoids a second, concurrent Pages deploy of the same commit on the manual
    # npm dispatch (which the Pages API rejects as an in-progress deployment).
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - uses: actions/checkout@v7
      # Serve index.html, and schema/ and dictionary/ at
      # nkorai.github.io/datasheet-schema/... so the $id URLs resolve permanently.
      - uses: actions/upload-pages-artifact@v5
        with:
          path: .
      - uses: actions/deploy-pages@v5
